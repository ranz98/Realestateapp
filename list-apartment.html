<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Apartment - MyHomeMyLand.LK</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-house-chimney-window"></i> Estato
        </div>
        <button class="mobile-menu-btn" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="nav-links">
            <a href="index.html">Explore</a>
            <a href="about.html">About Us</a>
            <a href="list-apartment.html" class="active btn-primary">List Apartment</a>
        </div>
    </nav>
    <main class="page-container form-page">
        <div class="form-wrapper">
            <h2>List Your Property Form</h2>
            <p>Reach thousands of potential renters instantly.</p>
            <form id="listing-form" class="listing-form">
                <div class="input-group">
                    <label for="title">Listing Title</label>
                    <input type="text" id="title" placeholder="e.g. Modern Studio in Downtown" required>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label for="price">Monthly Rent ($)</label>
                        <input type="number" id="price" placeholder="2500" required>
                    </div>
                    <div class="input-group">
                        <label for="beds">Bedrooms</label>
                        <select id="beds" required>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3+</option>
                            <option value="studio">Studio</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label for="address">Full Address</label>
                    <input type="text" id="address" placeholder="123 Main St, New York, NY" required>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea rows="4" placeholder="Tell us about the property features..." required></textarea>
                </div>
                <div class="input-group dropzone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Drag & drop photos here or <span>browse</span></p>
                </div>
                <button type="submit" class="btn-primary w-100 mt-3">Submit Listing</button>
            </form>
        </div>
    </main>
</body>
</html>
